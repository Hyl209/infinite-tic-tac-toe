<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08090d">
    <meta name="description" content="HYL Space 玩家中心，查看签到、活动与通知">
    <title>玩家中心 - HYL Space</title>
    <link rel="icon" href="/assets/images/image_01.png">
    <link rel="stylesheet" href="/assets/styles/game.css">
    <link rel="stylesheet" href="/assets/styles/portal.css">
    <link rel="stylesheet" href="/assets/styles/player.css">
    <link rel="stylesheet" href="/assets/styles/apple-system.css?v=20260720-breathe2">
    <script src="/assets/vendor/gsap/gsap.min.js" defer></script>
    <script src="/assets/vendor/gsap/ScrollTrigger.min.js" defer></script>
    <script src="/src/ui/apple-animations.js" defer></script>
    <script src="/src/config/online.js" defer></script>
    <script src="/src/utils/room-code.js" defer></script>
    <script src="/src/services/online.js" defer></script>
    <script src="/src/services/account.js" defer></script>
    <script src="/src/services/economy.js" defer></script>
    <script src="/src/services/stats.js" defer></script>
    <script src="/src/services/checkin.js" defer></script>
    <script src="/src/services/shop.js" defer></script>
    <script src="/src/services/activities.js" defer></script>
    <script src="/src/services/notifications.js" defer></script>
    <script src="/src/services/friends.js" defer></script>
    <script src="/src/routes/account-panel.js" defer></script>
    <script src="/src/routes/player.js" defer></script>
    <script src="/src/routes/notification-bell.js" defer></script>
    <script src="/src/routes/social-inbox.js" defer></script>
  </head>
  <body data-view="player" data-apple-page="player">
    <a class="skip-link" href="#player-main">跳到玩家中心内容</a>
    <div class="apple-aurora" aria-hidden="true">
      <span class="apple-glow apple-glow--blue"></span>
      <span class="apple-glow apple-glow--indigo"></span>
      <span class="apple-glow apple-glow--purple"></span>
      <span class="apple-glow apple-glow--pink"></span>
    </div>
    <header class="site-nav" data-apple-nav>
      <span class="apple-scroll-progress" aria-hidden="true"></span>
      <div class="site-nav-inner">
        <a class="site-brand" href="/" aria-label="返回 HYL Space 首页">
          <span class="site-brand-mark" aria-hidden="true">
            <img src="/assets/images/image_01.png" alt="">
          </span>
          <span>HYL SPACE</span>
        </a>

        <button
          id="site-menu-button"
          class="site-menu-button"
          type="button"
          aria-expanded="false"
          aria-controls="site-menu"
        >
          <span>菜单</span>
          <i aria-hidden="true"></i>
        </button>

        <nav id="site-menu" class="site-menu player-header-links" aria-label="玩家中心快捷导航">
          <a href="/">首页</a>
          <a href="/game/">游戏专区</a>
          <a id="notification-bell" class="notification-bell" href="/player/?tab=notifications" aria-label="查看通知">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M6.5 9.5a5.5 5.5 0 0 1 11 0c0 5 2 5.5 2 7H4.5c0-1.5 2-2 2-7Z"></path><path d="M9.7 19a2.5 2.5 0 0 0 4.6 0"></path></svg>
            <span id="notification-unread-count" class="notification-unread-count" hidden>0</span>
          </a>
        </nav>

        <button id="account-button" class="account-button" type="button" aria-label="打开账号面板" aria-haspopup="dialog" aria-controls="account-dialog">
          <span class="account-avatar" aria-hidden="true">游</span>
          <span class="account-button-copy">
            <small id="account-kind-label">游客身份</small>
            <strong id="account-display-name">匿名玩家</strong>
          </span>
          <span id="account-coin-balance" class="coin-balance" hidden data-apple-counter>金币 0</span>
        </button>
      </div>
    </header>

    <main id="player-main" class="player-shell" tabindex="-1" data-apple-entrance>
      <section id="player-summary" class="player-summary" aria-labelledby="player-summary-name" data-apple-entrance-item data-apple-reveal data-apple-card data-apple-theme="blend">
        <div class="player-summary-copy">
          <p id="player-summary-kind">游客身份</p>
          <h1 id="player-summary-name">匿名玩家</h1>
          <p id="player-summary-uid" class="player-summary-uid" hidden>UID 000000</p>
        </div>
        <div class="player-summary-meta" aria-label="玩家摘要">
          <span id="player-summary-balance" hidden data-apple-counter>金币 0</span>
        </div>
      </section>

      <div class="player-workspace">
        <nav class="player-tabs" role="tablist" aria-label="玩家中心栏目" aria-orientation="vertical" data-apple-entrance-item>
          <button id="player-tab-checkin" class="player-tab" type="button" role="tab" aria-selected="true" aria-controls="player-panel-checkin" data-player-tab="checkin">
            签到月历
          </button>
          <button id="player-tab-activities" class="player-tab" type="button" role="tab" aria-selected="false" aria-controls="player-panel-activities" data-player-tab="activities" tabindex="-1">
            活动
          </button>
          <button id="player-tab-notifications" class="player-tab" type="button" role="tab" aria-selected="false" aria-controls="player-panel-notifications" data-player-tab="notifications" tabindex="-1">
            通知
          </button>
          <button id="player-tab-friends" class="player-tab" type="button" role="tab" aria-selected="false" aria-controls="player-panel-friends" data-player-tab="friends" tabindex="-1">
            好友
          </button>
          <button id="player-tab-shop" class="player-tab" type="button" role="tab" aria-selected="false" aria-controls="player-panel-shop" data-player-tab="shop" tabindex="-1">
            商城
          </button>
          <button id="player-tab-inventory" class="player-tab" type="button" role="tab" aria-selected="false" aria-controls="player-panel-inventory" data-player-tab="inventory" tabindex="-1">
            背包
          </button>
        </nav>

        <div class="player-content">
          <section id="player-panel-checkin" class="player-panel" role="tabpanel" aria-labelledby="player-tab-checkin" data-player-panel="checkin" tabindex="-1" data-apple-entrance-item data-apple-reveal data-apple-theme="blue">
            <header class="player-panel-heading">
              <h2>签到月历</h2>
            </header>
            <div id="checkin-guest-state" class="player-guest-state">
              <p>请先登录正式账号，再进行每日签到。</p>
              <button id="checkin-login-button" class="player-primary-action apple-button--primary" type="button" data-apple-breathe>登录账号</button>
            </div>
            <div id="checkin-calendar" class="player-placeholder" aria-live="polite" hidden></div>
          </section>

          <section id="player-panel-activities" class="player-panel" role="tabpanel" aria-labelledby="player-tab-activities" data-player-panel="activities" tabindex="-1" hidden data-apple-reveal data-apple-theme="purple">
            <header class="player-panel-heading">
              <h2>活动</h2>
            </header>
            <div id="activity-list" class="player-placeholder" aria-live="polite">
              <p>正在加载活动。</p>
            </div>
          </section>

          <section id="player-panel-notifications" class="player-panel" role="tabpanel" aria-labelledby="player-tab-notifications" data-player-panel="notifications" tabindex="-1" hidden data-apple-reveal data-apple-theme="magenta">
            <header class="player-panel-heading">
              <h2>通知</h2>
            </header>
            <div id="notification-list" class="player-placeholder" aria-live="polite">
              <p>正在加载通知。</p>
            </div>
          </section>

          <section id="player-panel-friends" class="player-panel" role="tabpanel" aria-labelledby="player-tab-friends" data-player-panel="friends" tabindex="-1" hidden data-apple-reveal data-apple-theme="blue">
            <header class="player-panel-heading">
              <h2>好友</h2>
            </header>
            <form id="friend-search-form" class="friend-search-form" role="search">
              <label for="friend-search-input">查找玩家</label>
              <div class="friend-search-row">
                <input id="friend-search-input" name="player" type="text" maxlength="20" autocomplete="off" spellcheck="false" placeholder="输入 6 位 UID 或完整用户名" required>
                <button class="player-primary-action apple-button--primary" type="submit">查找玩家</button>
              </div>
            </form>
            <div id="friend-search-result" class="friend-search-result" aria-live="polite"></div>
            <div class="friend-sections">
              <section aria-labelledby="incoming-friend-title">
                <h3 id="incoming-friend-title">收到的申请</h3>
                <div id="incoming-friend-requests" class="friend-request-list"></div>
              </section>
              <section aria-labelledby="outgoing-friend-title">
                <h3 id="outgoing-friend-title">发出的申请</h3>
                <div id="outgoing-friend-requests" class="friend-request-list"></div>
              </section>
              <section aria-labelledby="friend-list-title">
                <h3 id="friend-list-title">好友列表</h3>
                <div id="friend-list" class="friend-list"></div>
              </section>
              <section aria-labelledby="game-invite-title">
                <h3 id="game-invite-title">游戏邀请</h3>
                <div id="game-invite-list" class="game-invite-list"></div>
              </section>
            </div>
            <p id="friend-message" class="player-message" aria-live="polite" aria-atomic="true"></p>
          </section>

          <section id="player-panel-shop" class="player-panel" role="tabpanel" aria-labelledby="player-tab-shop" data-player-panel="shop" tabindex="-1" hidden data-apple-reveal data-apple-theme="purple">
            <header class="player-panel-heading">
              <h2>商城</h2>
            </header>
            <div id="shop-product-list" class="shop-product-list" aria-live="polite">
              <p class="player-placeholder">正在加载商品。</p>
            </div>
            <p id="shop-message" class="player-message" aria-live="polite" aria-atomic="true"></p>
          </section>

          <section id="player-panel-inventory" class="player-panel" role="tabpanel" aria-labelledby="player-tab-inventory" data-player-panel="inventory" tabindex="-1" hidden data-apple-reveal data-apple-theme="blend">
            <header class="player-panel-heading">
              <h2>背包</h2>
            </header>
            <div id="inventory-list" class="inventory-list" aria-live="polite">
              <p class="player-placeholder">登录后查看背包。</p>
            </div>
            <p id="inventory-message" class="player-message" aria-live="polite" aria-atomic="true"></p>
          </section>

          <p id="player-message" class="player-message" aria-live="polite" aria-atomic="true"></p>
        </div>
      </div>

      <dialog id="shop-purchase-dialog" class="shop-purchase-dialog" aria-labelledby="shop-purchase-title">
        <div class="shop-purchase-shell">
          <h2 id="shop-purchase-title">确认购买</h2>
          <p id="shop-purchase-name"></p>
          <p id="shop-purchase-price"></p>
          <div class="shop-purchase-actions">
            <button id="shop-purchase-cancel" class="player-secondary-action apple-button--secondary" type="button">取消购买</button>
            <button id="shop-purchase-confirm" class="player-primary-action apple-button--primary" type="button" data-apple-breathe>确认购买</button>
          </div>
        </div>
      </dialog>

      <template id="makeup-payment-options-template">
        <label><input type="radio" name="makeupPayment" value="coins">使用金币</label>
        <label><input type="radio" name="makeupPayment" value="item">使用补签卡</label>
      </template>

      <dialog id="account-dialog" class="account-dialog" aria-labelledby="account-dialog-title">
        <div class="account-dialog-shell">
          <button id="account-close-button" class="account-close-button" type="button">关闭</button>
          <header class="account-dialog-header">
            <h2 id="account-dialog-title">登录账号</h2>
            <p id="account-dialog-description"></p>
          </header>

          <div id="account-auth-view">
            <div class="account-tabs" role="tablist" aria-label="登录或注册">
              <button id="account-login-tab" type="button" role="tab" aria-selected="true">登录</button>
              <button id="account-register-tab" type="button" role="tab" aria-selected="false">注册</button>
            </div>

            <form id="account-login-form" class="account-form" data-apple-tab-panel>
              <label class="account-field" for="login-username">
                <span>用户名</span>
                <input id="login-username" name="username" type="text" minlength="3" maxlength="20" pattern="[A-Za-z0-9_]{3,20}" autocomplete="username" spellcheck="false" required>
              </label>
              <label class="account-field" for="login-password">
                <span>密码</span>
                <input id="login-password" name="password" type="password" minlength="8" maxlength="64" autocomplete="current-password" required>
              </label>
              <button class="button primary apple-button--primary" type="submit">登录账号</button>
            </form>

            <form id="account-register-form" class="account-form" data-apple-tab-panel hidden>
              <label class="account-field" for="register-username">
                <span>登录用户名</span>
                <input id="register-username" name="username" type="text" minlength="3" maxlength="20" pattern="[A-Za-z0-9_]{3,20}" autocomplete="username" spellcheck="false" aria-describedby="username-hint" required>
                <small id="username-hint">3 至 20 位英文、数字或下划线</small>
              </label>
              <label class="account-field" for="register-password">
                <span>密码</span>
                <input id="register-password" name="password" type="password" minlength="8" maxlength="64" autocomplete="new-password" required>
              </label>
              <label class="account-field" for="register-game-name">
                <span>设置游戏名</span>
                <input id="register-game-name" name="gameName" type="text" maxlength="16" autocomplete="nickname" required>
              </label>
              <button class="button primary apple-button--primary" type="submit">注册账号</button>
            </form>
          </div>

          <form id="account-profile-form" class="account-form" hidden>
            <p class="account-username">登录用户名 <strong id="profile-username"></strong></p>
            <p class="account-username">玩家 UID <strong id="profile-player-uid"></strong></p>
            <label class="account-field" for="profile-game-name">
              <span>修改游戏名，消耗 1 张改名卡</span>
              <input id="profile-game-name" name="gameName" type="text" maxlength="16" autocomplete="nickname" required>
              <small>当前改名卡 <strong id="profile-rename-card-count" data-apple-counter>0</strong> 张，<a href="/player/?tab=shop">前往商城</a></small>
            </label>
            <div class="account-profile-actions">
              <button class="button primary apple-button--primary" type="submit">保存游戏名</button>
              <button id="account-logout-button" class="button danger" type="button">退出账号</button>
            </div>
          </form>

          <section id="wallet-panel" class="wallet-panel" hidden aria-labelledby="wallet-title">
            <div class="wallet-heading">
              <div>
                <small>可用金币</small>
                <strong id="wallet-balance" data-apple-counter>0</strong>
              </div>
              <button id="open-admin-button" class="button secondary apple-button--secondary" type="button" hidden>管理后台</button>
            </div>
            <form id="redeem-code-form" class="redeem-form">
              <label class="account-field" for="redeem-code-input">
                <span id="wallet-title">兑换码</span>
                <div class="redeem-row">
                  <input id="redeem-code-input" name="code" type="text" maxlength="16" autocomplete="off" spellcheck="false" placeholder="XXXX-XXXX-XXXX" required>
                  <button class="button primary apple-button--primary" type="submit">领取金币</button>
                </div>
              </label>
            </form>
            <p id="redeem-message" class="account-message" aria-live="polite"></p>
          </section>

          <section id="match-history-panel" class="match-history-panel" hidden aria-labelledby="match-history-title">
            <div class="match-history-heading">
              <div>
                <h3 id="match-history-title">最近对局</h3>
              </div>
              <label for="match-history-filter">
                <span class="visually-hidden">筛选游戏</span>
                <select id="match-history-filter">
                  <option value="">全部游戏</option>
                  <option value="tic_tac_toe">无限井字棋</option>
                  <option value="gomoku">五子棋</option>
                </select>
              </label>
            </div>
            <div id="season-summary" class="season-summary" aria-live="polite"></div>
            <p id="match-history-message" class="account-message" aria-live="polite"></p>
            <div id="match-history-list" class="match-history-list"></div>
            <button id="load-more-history-button" class="button secondary apple-button--secondary" type="button" hidden>加载更多战绩</button>
          </section>

          <p id="account-message" class="account-message" aria-live="polite"></p>
        </div>
      </dialog>
      <div id="social-toast-region" class="social-toast-region" aria-live="polite" aria-atomic="false"></div>
    </main>
  </body>
</html>
