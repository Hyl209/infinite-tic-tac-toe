<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111827">
    <meta name="description" content="支持三档 AI、本地双人和线上好友房间的井字棋与五子棋">
    <title>棋局 - 井字棋与五子棋</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <script src="online-config.js" defer></script>
    <script src="tic-tac-toe.js" defer></script>
    <script src="gomoku.js" defer></script>
    <script src="online.js" defer></script>
    <script src="game.js" defer></script>
  </head>
  <body>
    <main class="site-shell">
      <section id="game-home" class="game-home" aria-labelledby="home-title">
        <header class="home-copy">
          <p class="home-mark" aria-hidden="true"><span>五</span><span>井</span></p>
          <div>
            <p class="home-kicker">选一盘，马上开局</p>
            <h1 id="home-title">两种棋局，三种对战方式</h1>
            <p>挑战三档 AI，和身边的人轮流落子，或把房间码发给好友在线对战。</p>
          </div>
        </header>

        <div class="game-picker" aria-label="选择游戏">
          <button class="game-choice tic-choice" type="button" data-game-type="tic_tac_toe">
            <span class="choice-preview tic-preview" aria-hidden="true">
              <i>X</i><i></i><i>O</i><i></i><i>X</i><i></i><i>O</i><i></i><i>X</i>
            </span>
            <span class="choice-copy">
              <strong>无限井字棋</strong>
              <small>每方只保留三颗棋子，旧棋会随落子消失。</small>
              <span>进入棋局</span>
            </span>
          </button>

          <button class="game-choice gomoku-choice" type="button" data-game-type="gomoku">
            <span class="choice-preview gomoku-preview" aria-hidden="true">
              <i></i><i></i><i></i><i></i><i></i><i></i><i></i>
            </span>
            <span class="choice-copy">
              <strong>五子棋</strong>
              <small>15×15 棋盘，无禁手，横竖斜五颗连成一线即胜。</small>
              <span>进入棋局</span>
            </span>
          </button>
        </div>
      </section>

      <section id="game-view" class="app-shell" hidden>
        <section class="control-panel" aria-labelledby="game-title">
          <button id="back-home-button" class="back-button" type="button">返回游戏首页</button>

          <header class="hero-copy">
            <p id="brand-mark" class="brand-mark" aria-hidden="true">X<span>O</span></p>
            <div>
              <h1 id="game-title">无限井字棋</h1>
              <p id="game-description">每方只保留 3 颗棋子，棋局永远不会填满。</p>
            </div>
          </header>

          <div class="status-card" data-result="playing">
            <p class="status-label">当前对局</p>
            <p id="status-text" class="status-text" aria-live="polite">轮到你，你是 X</p>
            <p id="mark-info" class="mark-info">你执 X，AI 执 O</p>
          </div>

          <div class="settings" aria-label="游戏设置">
            <fieldset>
              <legend>对战模式</legend>
              <div class="segmented-control">
                <label>
                  <input type="radio" name="game-mode" value="ai" checked>
                  <span>人机对战</span>
                </label>
                <label>
                  <input type="radio" name="game-mode" value="pvp">
                  <span>双人对战</span>
                </label>
                <label>
                  <input type="radio" name="game-mode" value="online">
                  <span>线上对战</span>
                </label>
              </div>
            </fieldset>

            <fieldset id="online-room-panel" hidden>
              <legend>好友房间</legend>
              <div class="online-room-actions">
                <button id="create-room-button" class="button primary" type="button">创建房间</button>
                <div class="room-join-row">
                  <input
                    id="room-code-input"
                    type="text"
                    inputmode="text"
                    maxlength="12"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="六位房间码"
                    placeholder="输入房间码"
                  >
                  <button id="join-room-button" class="button secondary" type="button">加入</button>
                </div>
              </div>
              <div id="online-room-session" class="online-room-session" hidden>
                <p>房间码 <strong id="room-code-display">------</strong></p>
                <div class="room-session-actions">
                  <button id="copy-room-button" class="button secondary" type="button">复制邀请</button>
                  <button id="leave-room-button" class="button danger" type="button">退出房间</button>
                </div>
              </div>
              <div id="online-undo-request" class="undo-request" hidden>
                <p id="online-undo-message"></p>
                <div class="undo-request-actions">
                  <button id="accept-undo-button" class="button primary" type="button">同意</button>
                  <button id="reject-undo-button" class="button secondary" type="button">拒绝</button>
                  <button id="cancel-undo-button" class="button secondary" type="button">取消请求</button>
                </div>
              </div>
              <p id="online-room-message" class="online-room-message" aria-live="polite"></p>
            </fieldset>

            <fieldset id="ai-difficulty-settings">
              <legend>AI 强度</legend>
              <div class="segmented-control">
                <label>
                  <input type="radio" name="difficulty" value="easy">
                  <span>简单</span>
                </label>
                <label>
                  <input type="radio" name="difficulty" value="normal" checked>
                  <span>普通</span>
                </label>
                <label>
                  <input type="radio" name="difficulty" value="hard">
                  <span>困难</span>
                </label>
              </div>
            </fieldset>

            <fieldset id="ai-first-settings">
              <legend>谁先落子</legend>
              <div class="segmented-control two-options">
                <label>
                  <input type="radio" name="first-player" value="player" checked>
                  <span>我先手</span>
                </label>
                <label>
                  <input type="radio" name="first-player" value="ai">
                  <span>AI 先手</span>
                </label>
              </div>
            </fieldset>

            <fieldset id="placement-settings" hidden>
              <legend>落子方式</legend>
              <div class="segmented-control two-options">
                <label>
                  <input type="radio" name="placement-mode" value="single">
                  <span>单击落子</span>
                </label>
                <label>
                  <input type="radio" name="placement-mode" value="confirm">
                  <span>点两次确认</span>
                </label>
              </div>
            </fieldset>
          </div>

          <section class="scoreboard" aria-label="本次会话比分">
            <div>
              <span id="left-score-name" class="score-name">玩家</span>
              <strong id="player-score">0</strong>
            </div>
            <div>
              <span id="middle-score-name" class="score-name">平局</span>
              <strong id="draw-score">0</strong>
            </div>
            <div>
              <span id="right-score-name" class="score-name">AI</span>
              <strong id="ai-score">0</strong>
            </div>
          </section>

          <div class="actions">
            <button id="restart-button" class="button primary" type="button">重新开始</button>
            <button id="undo-button" class="button secondary" type="button">悔棋</button>
            <button id="clear-score-button" class="button secondary" type="button">清空比分</button>
          </div>
        </section>

        <section class="game-panel" aria-label="棋盘">
          <div class="arena-heading">
            <div>
              <span id="arena-label" class="arena-label">动态棋盘</span>
              <strong id="difficulty-label">普通模式</strong>
            </div>
            <span id="thinking-label" class="thinking-label" aria-hidden="true">AI 思考中</span>
            <span id="online-connection-label" class="connection-label" hidden>连接中</span>
          </div>

          <div id="board" class="board" role="grid" aria-label="棋盘"></div>

          <p id="game-note" class="game-note">
            <span class="expiry-swatch" aria-hidden="true"></span>
            <span id="game-note-text">高亮棋子会在该方下次落子时消失</span>
          </p>
        </section>
      </section>
    </main>
  </body>
</html>
